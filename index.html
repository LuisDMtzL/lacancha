<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Cancha</title>

  <!-- React (DEV para evitar errores minificados) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- (Opcional) Meta moderno -->
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    #root { padding: 20px; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">

    // ✅ Define TODOS tus componentes antes de usarlos

    function App() {
      const [data, setData] = React.useState(null);

      React.useEffect(() => {
        console.log("Primera carga de datos");

        // Simulación de carga (reemplaza con tu lógica real)
        setTimeout(() => {
          setData({ mensaje: "App funcionando correctamente 🚀" });
        }, 500);
      }, []);

      if (!data) {
        return <div>Cargando...</div>;
      }

      return (
        <div>
          <h1>{data.mensaje}</h1>
        </div>
      );
    }

    // ✅ Asegura que root existe
    const rootElement = document.getElementById("root");

    if (!rootElement) {
      console.error("No existe el div #root");
    } else {
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    }

  </script>

</body>
</html>
