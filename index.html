<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="theme-color" content="#1a472a">
  <title>⚽ Mi Cancha - Gestión de Torneos</title>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi4pq94oCiIE1pIENhbmNoYSIsInNob3J0X25hbWUiOiJNaSBDYW5jaGEiLCJzdGFydF91cmwiOiIvIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzFhNDcyYSIsInRoZW1lX2NvbG9yIjoiIzFhNDcyYSIsImlucHV0IjoiZXllZCIsImljb25zIjpbeyJzcmMiOiJkYXRhOmltYWdlL3N2Zyt4bWwsJTNDc3ZnJTIwdmlld0JveCUzRCcwJTIwMCUyMDEwMCUyMDEwMCclMjB4bWxucyUzRCdodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyclM0UlM0NyZWN0JTIwd2lkdGglM0QnMTAwJyUyMGhlaWdodCUzRCcxMDAnJTIwZmlsbCUzRCclMjMxYTQ3MmEnLyUzRSUzQ3RleHQlMjB4JTNEJzUwJTI1JyUyMHklM0QnNTAlMjUnMjB0ZXh0LWFuY2hvciUzRCdtaWRkbGUnMjBkb21pbmFudC1iYXNlbGluZSUzRCdtaWRkbGUnMjBmb250LXNpemUlM0QnNjAnMjBmaWxsJTNEJyUyM2ZmZDcwMCclM0Ulc3ViJTNDL3N1YiUzRSUzQy90ZXh0JTNFJTNDL3N2ZyUzRSIsInNpemVzIjoiNTEyeDUxMiIsInR5cGUiOiJpbWFnZS9zdmcreG1sIn1dfQ==">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    input, select, button {
      font-family: inherit;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>

<body>
  <div id="root"></div>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Trophy, Calendar, Users, Settings, ChevronRight, Plus, X, Edit2, Save } = lucide;

    function FutbolApp() {
      const [activeTab, setActiveTab] = useState('partidos');
      const [teams, setTeams] = useState([]);
      const [matches, setMatches] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminPassword, setAdminPassword] = useState('');
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [loading, setLoading] = useState(true);
      const [editingMatch, setEditingMatch] = useState(null);
      const [showAddMatch, setShowAddMatch] = useState(false);
      const [showAddTeam, setShowAddTeam] = useState(false);

      useEffect(() => {
        loadData();
      }, []);

      const loadData = async () => {
        try {
          setLoading(true);
          const teamsData = localstorage.getItem('teams');
          const matchesData = localstorage.getItem('matches');
          
          if (teamsData) {
            setTeams(JSON.parse(teamsData));
          }
          if (matchesData) {
            setMatches(JSON.parse(matchesData));
          }
        } catch (error) {
          console.log('Primera carga de datos');
        } finally {
          setLoading(false);
        }
      };

      const saveTeams =  (newTeams) => {
        try {
          localstorage.set('teams', JSON.stringify(newTeams), true);
          setTeams(newTeams);
        } catch (error) {
          alert('Error al guardar equipos');
        }
      };

      const saveMatches =  (newMatches) => {
        try {
          localstorage.set('matches', JSON.stringify(newMatches), true);
          setMatches(newMatches);
        } catch (error) {
          alert('Error al guardar partidos');
        }
      };

      const handleAdminLogin = () => {
        if (adminPassword === 'admin123') {
          setIsAdmin(true);
          setShowAdminLogin(false);
          setAdminPassword('');
        } else {
          alert('Contraseña incorrecta');
        }
      };

      const addTeam = async (name) => {
        const newTeam = {
          id: Date.now().toString(),
          name,
          played: 0,
          won: 0,
          drawn: 0,
          lost: 0,
          goalsFor: 0,
          goalsAgainst: 0,
          points: 0
        };
        await saveTeams([...teams, newTeam]);
        setShowAddTeam(false);
      };

      const addMatch = async (homeTeamId, awayTeamId, date, time) => {
        const newMatch = {
          id: Date.now().toString(),
          homeTeamId,
          awayTeamId,
          date,
          time,
          homeScore: null,
          awayScore: null,
          played: false
        };
        await saveMatches([...matches, newMatch]);
        setShowAddMatch(false);
      };

      const updateMatchScore = async (matchId, homeScore, awayScore) => {
        const updatedMatches = matches.map(m => 
          m.id === matchId 
            ? { ...m, homeScore: parseInt(homeScore), awayScore: parseInt(awayScore), played: true }
            : m
        );
        
        await saveMatches(updatedMatches);
        updateStandings(updatedMatches);
        setEditingMatch(null);
      };

      const updateStandings = async (matchesList) => {
        const updatedTeams = teams.map(team => ({
          ...team,
          played: 0,
          won: 0,
          drawn: 0,
          lost: 0,
          goalsFor: 0,
          goalsAgainst: 0,
          points: 0
        }));

        matchesList.filter(m => m.played).forEach(match => {
          const homeTeam = updatedTeams.find(t => t.id === match.homeTeamId);
          const awayTeam = updatedTeams.find(t => t.id === match.awayTeamId);

          if (homeTeam && awayTeam) {
            homeTeam.played++;
            awayTeam.played++;
            homeTeam.goalsFor += match.homeScore;
            homeTeam.goalsAgainst += match.awayScore;
            awayTeam.goalsFor += match.awayScore;
            awayTeam.goalsAgainst += match.homeScore;

            if (match.homeScore > match.awayScore) {
              homeTeam.won++;
              homeTeam.points += 3;
              awayTeam.lost++;
            } else if (match.homeScore < match.awayScore) {
              awayTeam.won++;
              awayTeam.points += 3;
              homeTeam.lost++;
            } else {
              homeTeam.drawn++;
              awayTeam.drawn++;
              homeTeam.points++;
              awayTeam.points++;
            }
          }
        });

        updatedTeams.sort((a, b) => {
          if (b.points !== a.points) return b.points - a.points;
          const goalDiffA = a.goalsFor - a.goalsAgainst;
          const goalDiffB = b.goalsFor - b.goalsAgainst;
          if (goalDiffB !== goalDiffA) return goalDiffB - goalDiffA;
          return b.goalsFor - a.goalsFor;
        });

        await saveTeams(updatedTeams);
      };

      const deleteMatch = async (matchId) => {
        if (confirm('¿Eliminar este partido?')) {
          const updatedMatches = matches.filter(m => m.id !== matchId);
          await saveMatches(updatedMatches);
          updateStandings(updatedMatches);
        }
      };

      const deleteTeam = async (teamId) => {
        if (confirm('¿Eliminar este equipo? Se eliminarán sus partidos.')) {
          const updatedTeams = teams.filter(t => t.id !== teamId);
          const updatedMatches = matches.filter(m => m.homeTeamId !== teamId && m.awayTeamId !== teamId);
          await saveTeams(updatedTeams);
          await saveMatches(updatedMatches);
        }
      };

      if (loading) {
        return (
          <div style={{ 
            minHeight: '100vh', 
            display: 'flex', 
            alignItems: 'center', 
            justifyContent: 'center',
            background: 'linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%)',
            color: '#fff',
            fontFamily: '"Barlow Semi Condensed", sans-serif'
          }}>
            <div style={{ textAlign: 'center' }}>
              <div style={{
                width: '50px',
                height: '50px',
                border: '4px solid rgba(255,255,255,0.3)',
                borderTop: '4px solid #fff',
                borderRadius: '50%',
                animation: 'spin 1s linear infinite',
                margin: '0 auto 20px'
              }}></div>
              <div style={{ fontSize: '18px', opacity: 0.9 }}>Cargando...</div>
            </div>
            <style>{`
              @keyframes spin {
                to { transform: rotate(360deg); }
              }
            `}</style>
          </div>
        );
      }

      return (
        <div style={{
          minHeight: '100vh',
          background: 'linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%)',
          fontFamily: '"Barlow Semi Condensed", sans-serif',
          paddingBottom: '80px'
        }}>
          <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
          
          <div style={{
            background: 'linear-gradient(135deg, #0f2818 0%, #1a472a 100%)',
            padding: '24px 20px',
            boxShadow: '0 4px 20px rgba(0,0,0,0.3)',
            position: 'relative',
            overflow: 'hidden'
          }}>
            <div style={{
              position: 'absolute',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              background: 'url("data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath d=\'M30 30m-20 0a20 20 0 1 0 40 0a20 20 0 1 0 -40 0\' fill=\'none\' stroke=\'rgba(255,255,255,0.03)\' stroke-width=\'1\'/%3E%3C/svg%3E")',
              opacity: 0.4
            }}></div>
            <div style={{ position: 'relative', zIndex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <div>
                  <h1 style={{
                    margin: 0,
                    fontSize: '32px',
                    fontWeight: 800,
                    color: '#fff',
                    letterSpacing: '0.5px',
                    textTransform: 'uppercase',
                    textShadow: '2px 2px 4px rgba(0,0,0,0.3)'
                  }}>
                    ⚽ Mi Cancha
                  </h1>
                  <div style={{
                    fontSize: '14px',
                    color: 'rgba(255,255,255,0.7)',
                    marginTop: '4px',
                    fontWeight: 600
                  }}>
                    Gestión de Torneos
                  </div>
                </div>
                <button
                  onClick={() => setShowAdminLogin(true)}
                  style={{
                    background: isAdmin ? '#ffd700' : 'rgba(255,255,255,0.1)',
                    border: 'none',
                    padding: '10px 16px',
                    borderRadius: '12px',
                    color: isAdmin ? '#0f2818' : '#fff',
                    cursor: 'pointer',
                    fontWeight: 700,
                    fontSize: '14px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '6px',
                    transition: 'all 0.3s ease',
                    boxShadow: isAdmin ? '0 4px 12px rgba(255,215,0,0.4)' : 'none'
                  }}
                >
                  <Settings size={18} />
                  {isAdmin ? 'ADMIN' : 'Admin'}
                </button>
              </div>
            </div>
          </div>

          <div style={{ padding: '20px', maxWidth: '800px', margin: '0 auto' }}>
            {activeTab === 'partidos' && (
              <div>
                <div style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center',
                  marginBottom: '20px'
                }}>
                  <h2 style={{
                    color: '#fff',
                    fontSize: '24px',
                    fontWeight: 700,
                    margin: 0,
                    textTransform: 'uppercase',
                    letterSpacing: '0.5px'
                  }}>
                    Fixture
                  </h2>
                  {isAdmin && (
                    <button
                      onClick={() => setShowAddMatch(true)}
                      style={{
                        background: '#ffd700',
                        border: 'none',
                        padding: '10px 16px',
                        borderRadius: '10px',
                        color: '#0f2818',
                        cursor: 'pointer',
                        fontWeight: 700,
                        fontSize: '14px',
                        display: 'flex',
                        alignItems: 'center',
                        gap: '6px',
                        boxShadow: '0 4px 12px rgba(255,215,0,0.3)'
                      }}
                    >
                      <Plus size={18} />
                      Partido
                    </button>
                  )}
                </div>

                {matches.length === 0 ? (
                  <div style={{
                    background: 'rgba(255,255,255,0.1)',
                    padding: '40px 20px',
                    borderRadius: '16px',
                    textAlign: 'center',
                    color: 'rgba(255,255,255,0.7)',
                    backdropFilter: 'blur(10px)'
                  }}>
                    No hay partidos programados
                  </div>
                ) : (
                  matches.map(match => {
                    const homeTeam = teams.find(t => t.id === match.homeTeamId);
                    const awayTeam = teams.find(t => t.id === match.awayTeamId);
                    
                    return (
                      <MatchCard 
                        key={match.id}
                        match={match}
                        homeTeam={homeTeam}
                        awayTeam={awayTeam}
                        isAdmin={isAdmin}
                        editingMatch={editingMatch}
                        setEditingMatch={setEditingMatch}
                        updateMatchScore={updateMatchScore}
                        deleteMatch={deleteMatch}
                      />
                    );
                  })
                )}
              </div>
            )}

            {activeTab === 'tabla' && (
              <StandingsTable teams={teams} />
            )}

            {activeTab === 'equipos' && (
              <TeamsList 
                teams={teams}
                isAdmin={isAdmin}
                setShowAddTeam={setShowAddTeam}
                deleteTeam={deleteTeam}
              />
            )}
          </div>

          <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />

          {showAdminLogin && !isAdmin && (
            <AdminLoginModal 
              adminPassword={adminPassword}
              setAdminPassword={setAdminPassword}
              handleAdminLogin={handleAdminLogin}
              setShowAdminLogin={setShowAdminLogin}
            />
          )}

          {showAddTeam && (
            <AddTeamModal 
              addTeam={addTeam}
              setShowAddTeam={setShowAddTeam}
            />
          )}

          {showAddMatch && (
            <AddMatchModal 
              teams={teams}
              addMatch={addMatch}
              setShowAddMatch={setShowAddMatch}
            />
          )}
        </div>
      );
    }

    function MatchCard({ match, homeTeam, awayTeam, isAdmin, editingMatch, setEditingMatch, updateMatchScore, deleteMatch }) {
      return (
        <div
          style={{
            background: 'linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%)',
            backdropFilter: 'blur(10px)',
            padding: '20px',
            borderRadius: '16px',
            marginBottom: '16px',
            border: '1px solid rgba(255,255,255,0.1)',
            boxShadow: '0 4px 16px rgba(0,0,0,0.2)',
          }}
        >
          <div style={{
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'flex-start',
            marginBottom: '12px'
          }}>
            <div style={{
              fontSize: '13px',
              color: 'rgba(255,255,255,0.6)',
              fontWeight: 600
            }}>
              {match.date} • {match.time}
            </div>
            {isAdmin && (
              <div style={{ display: 'flex', gap: '8px' }}>
                <button
                  onClick={() => setEditingMatch(match.id)}
                  style={{
                    background: 'rgba(255,215,0,0.2)',
                    border: 'none',
                    padding: '6px 10px',
                    borderRadius: '8px',
                    color: '#ffd700',
                    cursor: 'pointer'
                  }}
                >
                  <Edit2 size={14} />
                </button>
                <button
                  onClick={() => deleteMatch(match.id)}
                  style={{
                    background: 'rgba(255,59,48,0.2)',
                    border: 'none',
                    padding: '6px 10px',
                    borderRadius: '8px',
                    color: '#ff3b30',
                    cursor: 'pointer'
                  }}
                >
                  <X size={14} />
                </button>
              </div>
            )}
          </div>

          {editingMatch === match.id ? (
            <div style={{ marginTop: '12px' }}>
              <div style={{
                display: 'flex',
                gap: '12px',
                alignItems: 'center',
                marginBottom: '12px'
              }}>
                <input
                  type="number"
                  placeholder="Goles"
                  defaultValue={match.homeScore || ''}
                  id={`home-${match.id}`}
                  style={{
                    flex: 1,
                    padding: '12px',
                    borderRadius: '10px',
                    border: '2px solid rgba(255,255,255,0.2)',
                    background: 'rgba(255,255,255,0.1)',
                    color: '#fff',
                    fontSize: '16px',
                    fontWeight: 700,
                    textAlign: 'center'
                  }}
                />
                <div style={{ color: '#fff', fontSize: '20px', fontWeight: 700 }}>-</div>
                <input
                  type="number"
                  placeholder="Goles"
                  defaultValue={match.awayScore || ''}
                  id={`away-${match.id}`}
                  style={{
                    flex: 1,
                    padding: '12px',
                    borderRadius: '10px',
                    border: '2px solid rgba(255,255,255,0.2)',
                    background: 'rgba(255,255,255,0.1)',
                    color: '#fff',
                    fontSize: '16px',
                    fontWeight: 700,
                    textAlign: 'center'
                  }}
                />
              </div>
              <button
                onClick={() => {
                  const homeScore = document.getElementById(`home-${match.id}`).value;
                  const awayScore = document.getElementById(`away-${match.id}`).value;
                  if (homeScore !== '' && awayScore !== '') {
                    updateMatchScore(match.id, homeScore, awayScore);
                  }
                }}
                style={{
                  width: '100%',
                  background: '#4cd964',
                  border: 'none',
                  padding: '12px',
                  borderRadius: '10px',
                  color: '#fff',
                  cursor: 'pointer',
                  fontWeight: 700,
                  fontSize: '15px',
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  gap: '8px'
                }}
              >
                <Save size={18} />
                Guardar
              </button>
            </div>
          ) : (
            <div style={{
              display: 'flex',
              justifyContent: 'space-between',
              alignItems: 'center'
            }}>
              <div style={{ flex: 1, textAlign: 'center' }}>
                <div style={{
                  fontSize: '18px',
                  fontWeight: 700,
                  color: '#fff'
                }}>
                  {homeTeam?.name || 'Equipo'}
                </div>
              </div>
              
              <div style={{
                background: match.played ? 'rgba(255,215,0,0.2)' : 'rgba(255,255,255,0.15)',
                padding: '12px 20px',
                borderRadius: '12px',
                minWidth: '80px',
                textAlign: 'center',
                border: match.played ? '2px solid rgba(255,215,0,0.3)' : '2px solid rgba(255,255,255,0.1)'
              }}>
                {match.played ? (
                  <div style={{
                    fontSize: '24px',
                    fontWeight: 800,
                    color: '#fff',
                    letterSpacing: '2px'
                  }}>
                    {match.homeScore} - {match.awayScore}
                  </div>
                ) : (
                  <div style={{
                    fontSize: '14px',
                    fontWeight: 700,
                    color: 'rgba(255,255,255,0.6)'
                  }}>
                    VS
                  </div>
                )}
              </div>

              <div style={{ flex: 1, textAlign: 'center' }}>
                <div style={{
                  fontSize: '18px',
                  fontWeight: 700,
                  color: '#fff'
                }}>
                  {awayTeam?.name || 'Equipo'}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function StandingsTable({ teams }) {
      return (
        <div>
          <h2 style={{
            color: '#fff',
            fontSize: '24px',
            fontWeight: 700,
            marginBottom: '20px',
            textTransform: 'uppercase'
          }}>
            Tabla de Posiciones
          </h2>

          {teams.length === 0 ? (
            <div style={{
              background: 'rgba(255,255,255,0.1)',
              padding: '40px 20px',
              borderRadius: '16px',
              textAlign: 'center',
              color: 'rgba(255,255,255,0.7)'
            }}>
              No hay equipos
            </div>
          ) : (
            <div style={{
              background: 'linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%)',
              borderRadius: '16px',
              overflow: 'hidden',
              border: '1px solid rgba(255,255,255,0.1)'
            }}>
              <div style={{
                display: 'grid',
                gridTemplateColumns: '50px 1fr 50px 50px 50px 60px',
                gap: '12px',
                padding: '16px 20px',
                background: 'rgba(0,0,0,0.2)',
                fontSize: '12px',
                fontWeight: 700,
                color: 'rgba(255,255,255,0.6)',
                textTransform: 'uppercase'
              }}>
                <div style={{ textAlign: 'center' }}>Pos</div>
                <div>Equipo</div>
                <div style={{ textAlign: 'center' }}>PJ</div>
                <div style={{ textAlign: 'center' }}>DG</div>
                <div style={{ textAlign: 'center' }}>GF</div>
                <div style={{ textAlign: 'center' }}>Pts</div>
              </div>

              {teams.map((team, index) => (
                <div
                  key={team.id}
                  style={{
                    display: 'grid',
                    gridTemplateColumns: '50px 1fr 50px 50px 50px 60px',
                    gap: '12px',
                    padding: '16px 20px',
                    borderBottom: index < teams.length - 1 ? '1px solid rgba(255,255,255,0.05)' : 'none',
                    background: index === 0 ? 'rgba(255,215,0,0.1)' : 'transparent'
                  }}
                >
                  <div style={{
                    textAlign: 'center',
                    fontWeight: 800,
                    fontSize: '18px',
                    color: index === 0 ? '#ffd700' : '#fff'
                  }}>
                    {index + 1}
                  </div>
                  <div style={{
                    fontWeight: 700,
                    fontSize: '16px',
                    color: '#fff',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '8px'
                  }}>
                    {team.name}
                    {index === 0 && <Trophy size={16} color="#ffd700" />}
                  </div>
                  <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.8)', fontWeight: 600 }}>
                    {team.played}
                  </div>
                  <div style={{
                    textAlign: 'center',
                    color: team.goalsFor - team.goalsAgainst > 0 ? '#4cd964' : 
                           team.goalsFor - team.goalsAgainst < 0 ? '#ff3b30' : 'rgba(255,255,255,0.8)',
                    fontWeight: 700
                  }}>
                    {team.goalsFor - team.goalsAgainst > 0 ? '+' : ''}{team.goalsFor - team.goalsAgainst}
                  </div>
                  <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.8)', fontWeight: 600 }}>
                    {team.goalsFor}
                  </div>
                  <div style={{ textAlign: 'center', fontWeight: 800, fontSize: '18px', color: '#ffd700' }}>
                    {team.points}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function TeamsList({ teams, isAdmin, setShowAddTeam, deleteTeam }) {
      return (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '20px' }}>
            <h2 style={{ color: '#fff', fontSize: '24px', fontWeight: 700, margin: 0, textTransform: 'uppercase' }}>
              Equipos
            </h2>
            {isAdmin && (
              <button
                onClick={() => setShowAddTeam(true)}
                style={{
                  background: '#ffd700',
                  border: 'none',
                  padding: '10px 16px',
                  borderRadius: '10px',
                  color: '#0f2818',
                  cursor: 'pointer',
                  fontWeight: 700,
                  display: 'flex',
                  alignItems: 'center',
                  gap: '6px'
                }}
              >
                <Plus size={18} />
                Equipo
              </button>
            )}
          </div>

          {teams.length === 0 ? (
            <div style={{
              background: 'rgba(255,255,255,0.1)',
              padding: '40px 20px',
              borderRadius: '16px',
              textAlign: 'center',
              color: 'rgba(255,255,255,0.7)'
            }}>
              No hay equipos
            </div>
          ) : (
            teams.map(team => (
              <div
                key={team.id}
                style={{
                  background: 'linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.08) 100%)',
                  padding: '20px',
                  borderRadius: '16px',
                  marginBottom: '12px',
                  display: 'flex',
                  justifyContent: 'space-between',
                  alignItems: 'center'
                }}
              >
                <div>
                  <div style={{ fontSize: '18px', fontWeight: 700, color: '#fff' }}>
                    {team.name}
                  </div>
                  <div style={{ fontSize: '13px', color: 'rgba(255,255,255,0.6)' }}>
                    {team.played} PJ • {team.points} Pts
                  </div>
                </div>
                {isAdmin && (
                  <button
                    onClick={() => deleteTeam(team.id)}
                    style={{
                      background: 'rgba(255,59,48,0.2)',
                      border: 'none',
                      padding: '8px 12px',
                      borderRadius: '8px',
                      color: '#ff3b30',
                      cursor: 'pointer'
                    }}
                  >
                    <X size={18} />
                  </button>
                )}
              </div>
            ))
          )}
        </div>
      );
    }

    function BottomNav({ activeTab, setActiveTab }) {
      const tabs = [
        { id: 'partidos', icon: Calendar, label: 'Partidos' },
        { id: 'tabla', icon: Trophy, label: 'Tabla' },
        { id: 'equipos', icon: Users, label: 'Equipos' }
      ];

      return (
        <div style={{
          position: 'fixed',
          bottom: 0,
          left: 0,
          right: 0,
          background: 'linear-gradient(135deg, #0f2818 0%, #1a472a 100%)',
          borderTop: '1px solid rgba(255,255,255,0.1)',
          display: 'flex',
          justifyContent: 'space-around',
          padding: '12px 0',
          zIndex: 1000
        }}>
          {tabs.map(tab => (
            <button
              key={tab.id}
              onClick={() => setActiveTab(tab.id)}
              style={{
                flex: 1,
                background: 'none',
                border: 'none',
                color: activeTab === tab.id ? '#ffd700' : 'rgba(255,255,255,0.5)',
                cursor: 'pointer',
                padding: '8px',
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                gap: '4px'
              }}
            >
              <tab.icon size={24} />
              <span style={{ fontSize: '12px', fontWeight: 700, textTransform: 'uppercase' }}>
                {tab.label}
              </span>
            </button>
          ))}
        </div>
      );
    }

    function AdminLoginModal({ adminPassword, setAdminPassword, handleAdminLogin, setShowAdminLogin }) {
      return (
        <div style={{
          position: 'fixed',
          top: 0,
          left: 0,
          right: 0,
          bottom: 0,
          background: 'rgba(0,0,0,0.8)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          zIndex: 2000,
          padding: '20px'
        }}>
          <div style={{
            background: 'linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%)',
            padding: '32px',
            borderRadius: '20px',
            maxWidth: '400px',
            width: '100%'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '24px' }}>
              <h3 style={{ color: '#fff', fontSize: '22px', fontWeight: 700, margin: 0 }}>
                Acceso Admin
              </h3>
              <button
                onClick={() => setShowAdminLogin(false)}
                style={{
                  background: 'rgba(255,255,255,0.1)',
                  border: 'none',
                  padding: '8px',
                  borderRadius: '8px',
                  color: '#fff',
                  cursor: 'pointer'
                }}
              >
                <X size={20} />
              </button>
            </div>
            <input
              type="password"
              placeholder="Contraseña"
              value={adminPassword}
              onChange={(e) => setAdminPassword(e.target.value)}
              onKeyPress={(e) => e.key === 'Enter' && handleAdminLogin()}
              style={{
                width: '100%',
                padding: '14px',
                borderRadius: '12px',
                border: '2px solid rgba(255,255,255,0.2)',
                background: 'rgba(255,255,255,0.1)',
                color: '#fff',
                fontSize: '16px',
                marginBottom: '16px'
              }}
            />
            <button
              onClick={handleAdminLogin}
              style={{
                width: '100%',
                background: '#ffd700',
                border: 'none',
                padding: '14px',
                borderRadius: '12px',
                color: '#0f2818',
                cursor: 'pointer',
                fontWeight: 700,
                fontSize: '16px'
              }}
            >
              INGRESAR
            </button>
            <div style={{ marginTop: '16px', fontSize: '13px', color: 'rgba(255,255,255,0.5)', textAlign: 'center' }}>
              Contraseña: admin123
            </div>
          </div>
        </div>
      );
    }

    function AddTeamModal({ addTeam, setShowAddTeam }) {
      return (
        <div style={{
          position: 'fixed',
          top: 0,
          left: 0,
          right: 0,
          bottom: 0,
          background: 'rgba(0,0,0,0.8)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          zIndex: 2000,
          padding: '20px'
        }}>
          <div style={{
            background: 'linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%)',
            padding: '32px',
            borderRadius: '20px',
            maxWidth: '400px',
            width: '100%'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '24px' }}>
              <h3 style={{ color: '#fff', fontSize: '22px', fontWeight: 700, margin: 0 }}>
                Nuevo Equipo
              </h3>
              <button onClick={() => setShowAddTeam(false)} style={{
                background: 'rgba(255,255,255,0.1)',
                border: 'none',
                padding: '8px',
                borderRadius: '8px',
                color: '#fff',
                cursor: 'pointer'
              }}>
                <X size={20} />
              </button>
            </div>
            <input
              type="text"
              placeholder="Nombre del equipo"
              id="team-name"
              style={{
                width: '100%',
                padding: '14px',
                borderRadius: '12px',
                border: '2px solid rgba(255,255,255,0.2)',
                background: 'rgba(255,255,255,0.1)',
                color: '#fff',
                fontSize: '16px',
                marginBottom: '16px'
              }}
            />
            <button
              onClick={() => {
                const name = document.getElementById('team-name').value.trim();
                if (name) addTeam(name);
              }}
              style={{
                width: '100%',
                background: '#ffd700',
                border: 'none',
                padding: '14px',
                borderRadius: '12px',
                color: '#0f2818',
                cursor: 'pointer',
                fontWeight: 700,
                fontSize: '16px'
              }}
            >
              AGREGAR
            </button>
          </div>
        </div>
      );
    }

    function AddMatchModal({ teams, addMatch, setShowAddMatch }) {
      return (
        <div style={{
          position: 'fixed',
          top: 0,
          left: 0,
          right: 0,
          bottom: 0,
          background: 'rgba(0,0,0,0.8)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          zIndex: 2000,
          padding: '20px'
        }}>
          <div style={{
            background: 'linear-gradient(135deg, #1a472a 0%, #2d5a3d 100%)',
            padding: '32px',
            borderRadius: '20px',
            maxWidth: '400px',
            width: '100%'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '24px' }}>
              <h3 style={{ color: '#fff', fontSize: '22px', fontWeight: 700, margin: 0 }}>
                Nuevo Partido
              </h3>
              <button onClick={() => setShowAddMatch(false)} style={{
                background: 'rgba(255,255,255,0.1)',
                border: 'none',
                padding: '8px',
                borderRadius: '8px',
                color: '#fff',
                cursor: 'pointer'
              }}>
                <X size={20} />
              </button>
            </div>

            <select id="home-team" style={{
              width: '100%',
              padding: '14px',
              borderRadius: '12px',
              border: '2px solid rgba(255,255,255,0.2)',
              background: 'rgba(255,255,255,0.1)',
              color: '#fff',
              fontSize: '16px',
              marginBottom: '12px'
            }}>
              <option value="">Equipo Local</option>
              {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>

            <select id="away-team" style={{
              width: '100%',
              padding: '14px',
              borderRadius: '12px',
              border: '2px solid rgba(255,255,255,0.2)',
              background: 'rgba(255,255,255,0.1)',
              color: '#fff',
              fontSize: '16px',
              marginBottom: '12px'
            }}>
              <option value="">Equipo Visitante</option>
              {teams.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
            </select>

            <input type="date" id="match-date" style={{
              width: '100%',
              padding: '14px',
              borderRadius: '12px',
              border: '2px solid rgba(255,255,255,0.2)',
              background: 'rgba(255,255,255,0.1)',
              color: '#fff',
              fontSize: '16px',
              marginBottom: '12px'
            }} />

            <input type="time" id="match-time" style={{
              width: '100%',
              padding: '14px',
              borderRadius: '12px',
              border: '2px solid rgba(255,255,255,0.2)',
              background: 'rgba(255,255,255,0.1)',
              color: '#fff',
              fontSize: '16px',
              marginBottom: '16px'
            }} />

            <button
              onClick={() => {
                const home = document.getElementById('home-team').value;
                const away = document.getElementById('away-team').value;
                const date = document.getElementById('match-date').value;
                const time = document.getElementById('match-time').value;
                if (home && away && date && time && home !== away) {
                  addMatch(home, away, date, time);
                } else {
                  alert('Completa todos los campos');
                }
              }}
              style={{
                width: '100%',
                background: '#ffd700',
                border: 'none',
                padding: '14px',
                borderRadius: '12px',
                color: '#0f2818',
                cursor: 'pointer',
                fontWeight: 700,
                fontSize: '16px'
              }}
            >
              CREAR PARTIDO
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FutbolApp />);
  </script>
</body>
</html>
